talentlens:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5434') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'talentlens') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'talentlens') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'talentlens') }}"
      schema: mart
      threads: 4
    prod:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER') }}"
      password: "{{ env_var('POSTGRES_PASSWORD') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'talentlens') }}"
      schema: mart
      threads: 8
