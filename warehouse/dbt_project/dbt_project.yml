name: talentlens
version: "1.0.0"
config-version: 2

profile: talentlens

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
seed-paths: ["seeds"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  talentlens:
    raw:
      +materialized: view
      +schema: raw
    staging:
      +materialized: view
      +schema: staging
    mart:
      +materialized: table
      +schema: mart
      fact_risk_scores:
        +materialized: incremental
        +unique_key: score_id
        +on_schema_change: append_new_columns
