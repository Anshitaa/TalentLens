apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: talentlens
  labels:
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.12.1
          command:
            - mlflow
            - server
            - --backend-store-uri
            - postgresql://talentlens:talentlens@postgres:5432/talentlens
            - --default-artifact-root
            - /mlflow/artifacts
            - --host
            - "0.0.0.0"
            - --port
            - "5000"
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: mlflow-artifacts
              mountPath: /mlflow/artifacts
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: mlflow-artifacts
          persistentVolumeClaim:
            claimName: mlflow-artifacts-pvc
