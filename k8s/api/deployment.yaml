apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: talentlens
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: talentlens/api:latest
          imagePullPolicy: Never   # use minikube's local registry
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: postgres-secret
            - secretRef:
                name: llm-secret
          readinessProbe:
            httpGet:
              path: /api/v1/risk/summary
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/risk/summary
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
