x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://talentlens:talentlens@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    AIRFLOW_CONN_TALENTLENS_POSTGRES: postgresql://talentlens:talentlens@postgres:5432/talentlens
    AIRFLOW_CONN_SPARK_DEFAULT: spark://spark-master:7077
    PYTHONPATH: /opt/airflow
    SPARK_MASTER_URL: spark://spark-master:7077
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      kafka-python==2.0.2
      dbt-postgres==1.7.4
      psycopg2-binary==2.9.9
      apache-airflow-providers-apache-spark==4.7.1
      httpx==0.27.0
  volumes:
    - ./orchestration/airflow/dags:/opt/airflow/dags
    - ./orchestration/airflow/plugins:/opt/airflow/plugins
    - ./warehouse/dbt_project:/opt/airflow/dbt_project
    - ./spark:/opt/airflow/spark
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

x-spark-common: &spark-common
  image: apache/spark:3.5.5
  platform: linux/amd64
  command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
  environment:
    SPARK_WORKER_MEMORY: 2G
    SPARK_WORKER_CORES: "2"
  volumes:
    - ./spark:/opt/talentlens/spark
    - spark-jars:/opt/spark/jars/extra
  profiles: [spark]

services:
  # ── Phase 1: Core Infrastructure ─────────────────────────────────────────

  postgres:
    image: postgres:15
    container_name: talentlens-postgres
    environment:
      POSTGRES_USER: talentlens        # Docker creates this user + db automatically
      POSTGRES_PASSWORD: talentlens
      POSTGRES_DB: talentlens
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./warehouse/migrations/01_schemas.sql:/docker-entrypoint-initdb.d/01_schemas.sql
      - ./warehouse/migrations/02_airflow_db.sh:/docker-entrypoint-initdb.d/02_airflow_db.sh
    ports:
      - "5434:5432"    # 5434 on host → 5432 inside container (5432 + 5433 taken by local postgres)
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "talentlens"]
      interval: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: talentlens-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: talentlens-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: talentlens-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic employee-events --partitions 6 --replication-factor 1 --config retention.ms=604800000
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic risk-score-updates --partitions 3 --replication-factor 1 --config retention.ms=259200000
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic audit-log --partitions 3 --replication-factor 1 --config retention.ms=2592000000
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic hiring-funnel-events --partitions 3 --replication-factor 1 --config retention.ms=604800000
      echo 'All 4 topics created.'
      "

  mock-hris:
    build:
      context: ./ingestion/mock_hris_api
      dockerfile: Dockerfile
    container_name: talentlens-hris
    environment:
      DATABASE_URL: postgresql://talentlens:talentlens@postgres:5432/talentlens
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

  airflow-init:
    <<: *airflow-common
    container_name: talentlens-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init &&
        airflow users create --username admin --password admin \
          --firstname Admin --lastname User --role Admin \
          --email admin@talentlens.local || true
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    container_name: talentlens-airflow-web
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      retries: 10

  airflow-scheduler:
    <<: *airflow-common
    container_name: talentlens-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Phase 2: Spark Cluster (start with: docker-compose --profile spark up -d) ──

  spark-master:
    image: apache/spark:3.5.5
    platform: linux/amd64
    container_name: talentlens-spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      SPARK_MASTER_HOST: spark-master
    ports:
      - "8090:8080"
      - "7077:7077"
    volumes:
      - ./spark:/opt/talentlens/spark
      - spark-jars:/opt/spark/jars/extra
    profiles: [spark]

  spark-worker-1:
    <<: *spark-common
    container_name: talentlens-spark-worker-1
    depends_on:
      - spark-master

  spark-worker-2:
    <<: *spark-common
    container_name: talentlens-spark-worker-2
    depends_on:
      - spark-master

  spark-jdbc-init:
    image: curlimages/curl:latest
    container_name: talentlens-spark-jdbc-init
    volumes:
      - spark-jars:/opt/spark/jars/extra
    command: >
      sh -c "curl -sL https://jdbc.postgresql.org/download/postgresql-42.7.3.jar
             -o /opt/spark/jars/extra/postgresql-42.7.3.jar && echo 'JDBC driver ready.'"
    profiles: [spark]

volumes:
  postgres-data:
  kafka-data:
  zookeeper-data:
  airflow-logs:
  spark-jars:
